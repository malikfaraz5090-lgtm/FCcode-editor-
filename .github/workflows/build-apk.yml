name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/android
      
      - name: Build Web App
        run: npm run build
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        run: |
          # System SDK use karo
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          
          # Required packages install karo
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
      
      - name: Create Android Project
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          ./gradlew assembleDebug
      
      - uses: actions/upload-artifact@v4
        with:
          name: FarazCodeEditor-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
