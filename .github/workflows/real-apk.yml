name: Build REAL APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name'
        required: true
        default: 'My App'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android
      
      - name: Build Web App
        run: npm run build
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK Manually
        run: |
          echo "Setting up Android SDK..."
          
          # Create SDK directory
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_HOME
          
          # Download cmdline-tools
          cd $ANDROID_HOME
          curl -s -O https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          rm -rf cmdline-tools/latest/cmdline-tools 2>/dev/null || true
          
          # Set environment
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          
          # Accept licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          
          # Install required packages
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          
          echo "✅ Android SDK setup complete!"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME/
      
      - name: Create Android Project
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android
          
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "✅ Android project created"
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      
      - name: Find APK
        run: |
          echo "Searching for APK..."
          find android/ -name "*.apk" -type f -ls
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: REAL-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
