name: Build REAL APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name'
        required: true
        default: 'My App'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android
      
      - name: Build Web App
        run: npm run build
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK (Fixed)
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'
      
      - name: Install Build Tools
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" 2>/dev/null || \
          yes | $ANDROID_HOME/cmdline-tools/16.0/bin/sdkmanager "build-tools;34.0.0" 2>/dev/null || true
          echo "✅ SDK ready"
      
      - name: Create Android Project
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: REAL-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
