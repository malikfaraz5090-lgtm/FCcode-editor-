name: Build APK (Android 16 Ready)

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/android
      
      - name: Build Web App
        run: npm run build
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Create Android Project
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android
          
          # Copy our custom files
          cp android/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml.bak 2>/dev/null || true
          
          echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - uses: actions/upload-artifact@v4
        with:
          name: FarazCodeEditor-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
