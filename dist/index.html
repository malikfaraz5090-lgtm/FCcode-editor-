<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e1e1e">
  <title>Faraz Code Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1e1e1e; overflow: hidden; }
    #app { width: 100vw; height: 100vh; }
    .splash {
      position: fixed; inset: 0; background: #1e1e1e; display: flex;
      flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
    }
    .splash-logo { width: 80px; height: 80px; background: #007acc; border-radius: 20px;
      display: flex; align-items: center; justify-content: center; font-size: 40px;
      font-weight: bold; color: white; font-family: monospace; margin-bottom: 16px;
      animation: pulse 2s infinite; }
    .splash-title { font-size: 22px; font-weight: 700; color: #007acc; }
    .splash-loader { width: 150px; height: 3px; background: #333; border-radius: 3px;
      margin-top: 20px; overflow: hidden; }
    .splash-loader div { height: 100%; background: #007acc; border-radius: 3px;
      animation: load 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    @keyframes load { 0%{width:0} 50%{width:70%} 100%{width:100%} }
  </style>
  <script type="module" crossorigin src="/assets/index-BK-OvCiT.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DocvIke9.css">
</head>
<body>
  <div id="app">
    <div class="splash" id="splash">
      <div class="splash-logo">F</div>
      <div class="splash-title">Faraz Code Editor</div>
      <div class="splash-loader"><div></div></div>
    </div>
  </div>
</body>
</html>
