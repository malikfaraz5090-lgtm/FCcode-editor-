<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Main Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Icon Gradient -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#007acc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005a9e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="#00d2ff" opacity="0.05"/>
  <circle cx="412" cy="412" r="120" fill="#007acc" opacity="0.05"/>
  <circle cx="400" cy="100" r="60" fill="#4ec9b0" opacity="0.03"/>
  
  <!-- Code brackets -->
  <g filter="url(#shadow)">
    <text x="256" y="220" text-anchor="middle" fill="url(#iconGrad)" font-size="180" font-weight="bold" font-family="monospace" filter="url(#glow)">&lt;/&gt;</text>
  </g>
  
  <!-- App name -->
  <text x="256" y="380" text-anchor="middle" fill="url(#iconGrad)" font-size="70" font-weight="bold" font-family="monospace">FCE</text>
  
  <!-- Subtitle -->
  <text x="256" y="430" text-anchor="middle" fill="#666" font-size="28" font-family="sans-serif" letter-spacing="4">CODE EDITOR</text>
  
  <!-- Bottom accent line -->
  <rect x="120" y="460" width="272" height="4" rx="2" fill="url(#iconGrad)" opacity="0.5"/>
</svg>
